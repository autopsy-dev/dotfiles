# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Input wiki https://wiki.hyprland.org/Configuring/Variables/#input

input {
    sensitivity = 0
    kb_layout=us,il
    kb_options=grp:win_space_toggle
    follow_mouse = 1 # 0|1|2|3
    float_switch_override_focus = 2
    touchpad {
        natural_scroll = yes
        scroll_factor = 1.0
    }
}

# Flat/no-accel for mouse only
device {
    name = elan1200:00-04f3:309f-mouse
    accel_profile = flat
    sensitivity = 0
}

# Adaptive acceleration for touchpad
device {
    name = elan1200:00-04f3:309f-touchpad
    accel_profile = adaptive
    sensitivity = 0
}
