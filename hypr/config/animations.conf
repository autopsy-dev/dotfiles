animations {
    enabled = yes

    bezier = fluent, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 2, fluent, slide
    animation = windowsIn, 1, 2, fluent, slide
    animation = windowsOut, 1, 2, fluent, popin 80%
    animation = border, 1, 3, default
    animation = workspacesIn, 1, 2, fluent, slide
    animation = workspacesOut, 1, 2, fluent, slide
    animation = layersIn, 1, 2, fluent, fade
    animation = layersOut, 1, 2, fluent, fade
}